<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odd Pet Hunter</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b0e14; color:#e8eefc; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
      h1 { font-size: 20px; margin: 8px 0 16px; }
      .card { background:#121826; border:1px solid #22304a; border-radius: 12px; padding: 14px; }
      input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #2a3a5d; background:#0b1020; color:#e8eefc; font-size: 16px; box-sizing: border-box; }
      button { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: 0; background:#4f7cff; color:#081022; font-weight: 700; font-size: 16px; }
      button:disabled { opacity: 0.6; }
      .row { display:flex; justify-content: space-between; padding: 10px 0; border-bottom:1px solid #22304a; }
      .row:last-child { border-bottom:0; }
      .k { opacity: 0.8; }
      .v { font-variant-numeric: tabular-nums; font-weight: 700; }
      .err { margin-top: 10px; color:#ff7b7b; white-space: pre-wrap; }

      .progress-bar-wrap { background:#1a2540; border-radius:6px; height:8px; margin:4px 0 10px; overflow:hidden; }
      .progress-bar-fill { height:100%; border-radius:6px; background:#4f7cff; transition:width .3s; }

      /* Tabs */
      .tabs { display:flex; gap:6px; margin: 14px 0 0; }
      .tab-btn { flex:1; padding: 10px; border-radius: 10px; border:1px solid #22304a; background:#0d1521; color:#e8eefc; font-size: 15px; font-weight: 700; cursor:pointer; opacity: 0.65; }
      .icon-slot { width:40px; height:40px; border-radius:10px; background:#000; border:1px solid #22304a; overflow:hidden; }
      .type-icon { display:block; width:40px; height:40px; object-fit:cover; }
      /* default “edge” look */
      .type-icon.edge { filter: contrast(1.05) brightness(0.95); }
      /* missing = grayscale + same edge look */
      .type-icon.bw { filter: grayscale(1) contrast(1.05) brightness(0.95); opacity: 0.75; }
      .tab-btn.active { background:#121826; opacity: 1; }
      .tab-panel { display:none; }
      .tab-panel.active { display:block; }
      .panel-wrap { background:#121826; border:1px solid #22304a; border-radius: 12px; padding: 14px; margin-top:10px; }

      .subtabs { display:flex; gap:4px; margin: 10px 0 0; }
      .subtab-btn { flex:1; padding: 10px; border-radius: 10px 10px 0 0; border:1px solid #22304a; border-bottom: none; background:#0d1521; color:#e8eefc; font-size: 14px; font-weight: 700; cursor:pointer; opacity: 0.6; }
      .subtab-btn.active { background:#121826; opacity: 1; }
      .subpanel { display:none; }
      .subpanel.active { display:block; }
      .subpanel-wrap { background:#121826; border:1px solid #22304a; border-radius: 0 0 12px 12px; padding: 14px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Pet Hunter 🐾</h1>
      <div style="opacity:0.6; font-size:13px; margin:-10px 0 14px;">A DFK pet tracker for the true collectors</div>

      <!-- TOP LEVEL TABS -->
      <div class="tabs">
        <button class="tab-btn active" data-top="leaderboard">🏆 Leaderboard</button>
        <button class="tab-btn" data-top="wallet">🎒 Wallet</button>
        <button class="tab-btn" data-top="stats">📊 Stats</button>
      </div>

      <!-- LEADERBOARD PANEL -->
      <div class="tab-panel active panel-wrap" id="top-leaderboard">
        <div id="out-leaderboard"><div class="k" style="padding:12px 0;">Loading leaderboard…</div></div>
      </div>

      <!-- WALLET PANEL -->
      <div class="tab-panel panel-wrap" id="top-wallet">
        <div class="card">
          <input id="addr" placeholder="0x..." autocomplete="off" autocapitalize="off" spellcheck="false" />
          <button id="btn">Check</button>
          <div id="err" class="err"></div>
        </div>

        <div class="subtabs">
          <button class="subtab-btn active" data-sub="user">👤 User wallet</button>
          <button class="subtab-btn" data-sub="types">📖 All types</button>
          <button class="subtab-btn" data-sub="wall">🧱 Collection wall</button>
        </div>

        <div class="subpanel active subpanel-wrap" id="sub-user">
          <div id="out-wallet"></div>
          <div id="out-gallery" style="margin-top:14px;"></div>
          <div id="out-missing" style="margin-top:14px;"></div>
        </div>

        <div class="subpanel subpanel-wrap" id="sub-types">
          <div id="out-catalog"></div>
        </div>

        <div class="subpanel subpanel-wrap" id="sub-wall">
          <div id="out-wall"><div class="k" style="padding:12px 0;">Run a wallet check to load wall…</div></div>
        </div>

        <div class="subpanel subpanel-wrap" id="sub-stats">
          <div id="out-stats"><div class="k" style="padding:12px 0;">Click to load stats…</div></div>
        </div>
      </div>

      <!-- STATS PANEL (TOP TAB) -->
      <div class="tab-panel panel-wrap" id="top-stats">
        <div class="card" style="margin-top:0;">
          <div class="v" style="font-size:14px; margin-bottom:6px;">Stats</div>
          <div class="k" style="font-size:12px;">Global stats (loads on open)</div>
        </div>
        <div id="out-stats-top"><div class="k" style="padding:12px 0;">Loading stats…</div></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      const addr = $("addr");
      const btn = $("btn");
      // btnShare is inside the Collection wall tab (not global wallet header)
      let btnShare = null;
      const err = $("err");
      const outWallet = $("out-wallet");
      const outCatalog = $("out-catalog");
      const outWall = $("out-wall");

      // --------------------
      // TOP TABS
      // --------------------
      function activateTop(tab) {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
        document.querySelector(`.tab-btn[data-top="${tab}"]`).classList.add('active');
        $("top-" + tab).classList.add('active');
      }
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.addEventListener('click', () => {
          activateTop(b.dataset.top);
          if (b.dataset.top === 'stats') loadStats();
        });
      });

      // --------------------
      // SUB TABS (inside wallet)
      // --------------------
      function activateSub(tab) {
        document.querySelectorAll('.subtab-btn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.subpanel').forEach(x => x.classList.remove('active'));
        document.querySelector(`.subtab-btn[data-sub="${tab}"]`).classList.add('active');
        $("sub-" + tab).classList.add('active');
      }
      document.querySelectorAll('.subtab-btn').forEach(b => {
        b.addEventListener('click', () => {
          activateSub(b.dataset.sub);
        });
      });

      // --------------------
      // UI helpers
      // --------------------
      function petRow(p) {
        const burned = (p.name || '').toLowerCase().startsWith('unrevealed');
        return `
          <div style="display:flex; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid #22304a;">
            <div style="position:relative; width:40px; height:40px; flex:0 0 40px;">
              <img src="${p.iconUrl}" alt="" width="40" height="40" style="border-radius:10px; background:#0b1020; border:1px solid #22304a; display:block;" />
              ${burned ? `
                <div style="position:absolute; inset:0; border-radius:10px; pointer-events:none;">
                  <div style="position:absolute; left:4px; right:4px; top:19px; height:3px; background:#ff4b4b; transform:rotate(45deg); transform-origin:center;"></div>
                  <div style="position:absolute; left:4px; right:4px; top:19px; height:3px; background:#ff4b4b; transform:rotate(-45deg); transform-origin:center;"></div>
                </div>
              ` : ''}
            </div>
            <div style="flex:1; min-width:0;">
              <div class="v" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${p.name}${burned ? ' (burned)' : ''}</div>
              <div class="k" style="font-size:12px;">ID: ${p.id}</div>
            </div>
          </div>
        `;
      }

      function progressBar(owned, total) {
        const pct = total > 0 ? Math.round((owned / total) * 100) : 0;
        return `
          <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:2px;">
            <span class="k">${owned} unique / ${total} types</span>
            <span class="v">${pct}%</span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
        `;
      }

      function renderWallet(address, displayName, counts, oddPets, veryOddPets, ownedUniqueOdd, ownedUniqueVeryOdd) {
        const u = window.__oddUltraUniqueTotals || {};
        const oddTotal = u.odd ?? null;
        const ultraTotal = u.ultraOdd ?? null;

        outWallet.innerHTML = `
          <div class="row"><div class="k">Address</div><div class="v" style="font-size:12px; max-width:60%; overflow:hidden; text-overflow:ellipsis;">${address}</div></div>
          ${displayName ? `<div class="row"><div class="k">Display</div><div class="v">${displayName}</div></div>` : ''}

          <div style="margin-top:12px;">
            <div onclick="toggleSection('odd-list')" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #22304a; user-select:none;">
              <div class="v">Odd</div>
              <div style="display:flex; align-items:center; gap:12px;">
                <span class="k" style="font-size:14px;">${counts.odd} pets</span>
                <span id="odd-chevron" style="font-size:12px; opacity:0.7;">▼</span>
              </div>
            </div>
            ${oddTotal != null ? progressBar(ownedUniqueOdd, oddTotal) : ''}
            <div id="odd-list" style="display:none; margin:8px 0 14px;">
              ${(oddPets || []).map(petRow).join("") || '<div class="k">(none)</div>'}
            </div>

            <div onclick="toggleSection('ultra-list')" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #22304a; user-select:none;">
              <div class="v">Ultra Odd</div>
              <div style="display:flex; align-items:center; gap:12px;">
                <span class="k" style="font-size:14px;">${counts.veryOdd} pets</span>
                <span id="ultra-chevron" style="font-size:12px; opacity:0.7;">▼</span>
              </div>
            </div>
            ${ultraTotal != null ? progressBar(ownedUniqueVeryOdd, ultraTotal) : ''}
            <div id="ultra-list" style="display:none; margin:8px 0 4px;">
              ${(veryOddPets || []).map(petRow).join("") || '<div class="k">(none)</div>'}
            </div>
          </div>
        `;

        window.toggleSection = function(id) {
          const el = document.getElementById(id);
          const chevronId = id === 'odd-list' ? 'odd-chevron' : 'ultra-chevron';
          const chevron = document.getElementById(chevronId);
          if (!el) return;
          const open = el.style.display === 'none';
          el.style.display = open ? 'block' : 'none';
          if (chevron) chevron.textContent = open ? '▲' : '▼';
        };
      }

      let __wallDebug = false;

      function sortTypes(items) {
        return [...(items || [])].sort((a,b) => Number(a.appearanceId) - Number(b.appearanceId));
      }

      function renderTypeWall(odd, ultraOdd) {
        odd = sortTypes(odd);
        ultraOdd = sortTypes(ultraOdd);

        const cols = 8;
        const tile = 64;
        const gap = 8;

        const tileHtml = (t, strokeOwned) => {
          const owned = (t.owned === true);
          const border = owned ? strokeOwned : '#334155';
          const imgClass = owned ? 'edge' : 'bw';

          // Use *actual owned pet image* when owned, otherwise fall back to the static type-icon.
          const imgSrc = owned && t.ownedPetId
            ? `https://pets.defikingdoms.com/image/${t.ownedPetId}`
            : t.iconUrl;

          const fullPetId = t.ownedPetId ? String(t.ownedPetId) : '-';
          const m = fullPetId.match(/^1000000(\d{6})$/);
          const shortPetId = m ? m[1] : null;
          const petLabel = shortPetId ? `${fullPetId} (${shortPetId})` : fullPetId;

          const overlay = __wallDebug ? `
            <div style="position:absolute; left:6px; top:6px; background:rgba(0,0,0,0.55); border-radius:6px; padding:2px 6px; font-size:11px; font-weight:700; line-height:1.25;">
              <div>${owned ? '✅' : '⬜'} F:${t.appearanceId}</div>
              <div style="opacity:.85;">P:${petLabel}</div>
            </div>` : '';

          return `
            <div style="position:relative; width:${tile}px; height:${tile}px; border-radius:12px; overflow:hidden; background:#000; border:4px solid ${border};">
              <img src="${imgSrc}" width="${tile}" height="${tile}" class="type-icon ${imgClass}" style="width:${tile}px; height:${tile}px;" onerror="this.remove();" />
              ${overlay}
            </div>`;
        };

        const grid = (items, strokeOwned) => {
          const w = cols * tile + (cols - 1) * gap;
          return `
            <div style="display:grid; grid-template-columns:repeat(${cols}, ${tile}px); gap:${gap}px; width:${w}px; max-width:100%; overflow:auto; padding-bottom:2px;">
              ${items.map(t => tileHtml(t, strokeOwned)).join('')}
            </div>`;
        };

        const section = (title, items, strokeOwned) => {
          const ownedCount = items.filter(i => i.owned === true).length;
          return `
            <div style="margin-bottom:14px;">
              <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
                <div class="v">${title}</div>
                <div class="k" style="font-size:12px;">${ownedCount}/${items.length}</div>
              </div>
              ${grid(items, strokeOwned)}
            </div>`;
        };

        const debugToggle = `
          <div style="margin-top:10px; border-top:1px solid #22304a; padding-top:10px; display:flex; justify-content:space-between; align-items:center;">
            <div class="k" style="font-size:12px;">Debug overlay (IDs)</div>
            <label style="display:flex; align-items:center; gap:8px; font-size:12px; user-select:none; cursor:pointer;">
              <input id="wall-debug-toggle" type="checkbox" ${__wallDebug ? 'checked' : ''} />
              <span class="v">${__wallDebug ? 'ON' : 'OFF'}</span>
            </label>
          </div>`;

        outWall.innerHTML = `
          <div class="card" style="margin-top:0;">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
              <div>
                <div class="v" style="font-size:14px; margin-bottom:6px;">Type Completion Wall</div>
                <div class="k" style="font-size:12px;">Owned uses real pet images · Missing uses type-icons</div>
              </div>
              <button id="btn-share" style="width:auto; padding:8px 12px; background:#22c55e; color:#05120a;">Download PNG</button>
            </div>
          </div>
          ${section('Ultra Odd', ultraOdd, '#c084fc')}
          ${section('Odd', odd, '#f59e0b')}
          <div class="card" style="margin-top:0;">
            ${debugToggle}
          </div>
        `;

        // wire download after DOM is in place
        wireDownloadButton();

        const cb = document.getElementById('wall-debug-toggle');
        if (cb) {
          cb.addEventListener('change', () => {
            __wallDebug = cb.checked;
            renderTypeWall(odd, ultraOdd);
          });
        }
      }

      function renderCatalog(odd, ultraOdd) {
        const typeRow = (t) => {
          const owned = (t.owned === true);
          const imgSrc = t.iconUrl || null;
          const imgClass = owned ? 'edge' : 'bw';
          return `
            <div style="display:flex; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid #22304a;">
              <div class="icon-slot" style="flex:0 0 40px;">
                ${imgSrc
                  ? `<img src="${imgSrc}" width="40" height="40" class="type-icon ${imgClass}" onerror="this.remove();" />`
                  : ``
                }
              </div>
              <div style="flex:1; min-width:0;">
                <div class="v" style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${owned ? '✅' : '⬜'} ${t.displayName}${t.variant ? ` (${t.variant})` : ''}</div>
                <div class="k" style="font-size:12px;">appearanceId: ${t.appearanceId}</div>
              </div>
            </div>`;
        };

        const section = (title, items) => `
          <div style="margin-bottom:18px;">
            <div class="v" style="margin-bottom:8px;">${title}</div>
            ${items.map(typeRow).join('') || '<div class="k">(none)</div>'}
          </div>
        `;

        outCatalog.innerHTML = section('All Odd types', odd) + section('All Ultra Odd types', ultraOdd);
      }

      function renderGallery(oddPets, veryOddPets) {
        const all = [...veryOddPets, ...oddPets];
        const el = $('out-gallery');
        if (!all.length) { el.innerHTML = ''; return; }
        const grid = all.map(p => {
          const isUltra = veryOddPets.some(x => x.id === p.id);
          const burned = (p.name||'').toLowerCase().startsWith('unrevealed');
          return `
            <div style="position:relative;" title="${p.name}">
              <img src="${p.iconUrl}" width="56" height="56" style="border-radius:10px; background:#0b1020; border:2px solid ${isUltra ? '#c084fc' : '#22304a'}; display:block;" />
              ${burned ? '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;">❌</div>' : ''}
              ${isUltra ? '<div style="position:absolute;top:-4px;right:-4px;font-size:10px;">⚡</div>' : ''}
            </div>`;
        }).join('');
        el.innerHTML = `
          <div style="border-top:1px solid #22304a; padding-top:12px;">
            <div class="v" style="margin-bottom:8px; font-size:13px;">Collection wall (${veryOddPets.length} ⚡ + ${oddPets.length} odd)</div>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">${grid}</div>
          </div>`;
      }

      function renderMissing(missingOdd, missingUltra) {
        const el = $('out-missing');
        if (!missingOdd.length && !missingUltra.length) { el.innerHTML = ''; return; }

        const chip = (t) => {
          const big = (t.path || '').toLowerCase().includes('bigblub') ? ' — BigBlub' : '';
          return `<div style="background:#0b1020; border:1px solid #22304a; border-radius:8px; padding:4px 8px; font-size:12px; opacity:.7;">${t.displayName}${t.variant ? ' ('+t.variant+')' : ''}${big}</div>`;
        };

        const section = (label, items) => items.length === 0 ? '' : `
          <div style="margin-bottom:10px;">
            <div class="k" style="font-size:13px; margin-bottom:6px;">Missing ${label} (${items.length})</div>
            <div style="display:flex; flex-wrap:wrap; gap:6px;">${items.map(chip).join('')}</div>
          </div>`;

        el.innerHTML = `
          <div style="border-top:1px solid #22304a; padding-top:12px;">
            <div onclick="toggleMissing()" style="cursor:pointer; display:flex; justify-content:space-between; margin-bottom:8px; user-select:none;">
              <div class="v" style="font-size:13px;">Missing types 🎯</div>
              <span id="missing-chevron" style="font-size:12px; opacity:.7;">▼</span>
            </div>
            <div id="missing-inner" style="display:none;">
              ${section('Ultra Odd', missingUltra)}
              ${section('Odd', missingOdd)}
            </div>
          </div>`;

        window.toggleMissing = function() {
          const inner = $('missing-inner');
          const ch = $('missing-chevron');
          const open = inner.style.display === 'none';
          inner.style.display = open ? 'block' : 'none';
          ch.textContent = open ? '▲' : '▼';
        };
      }

      // --------------------
      // API calls
      // --------------------
      async function runWalletCheck() {
        err.textContent = '';
        outWallet.innerHTML = '';
        outCatalog.innerHTML = '';
        outWall.innerHTML = '';

        const a = addr.value.trim();
        if (!/^0x[0-9a-fA-F]{40}$/.test(a)) {
          err.textContent = 'Invalid address';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Checking…';
        try {
          const [r1, r2] = await Promise.all([
            fetch(`/api/owner?address=${encodeURIComponent(a)}`),
            fetch(`/api/catalog?address=${encodeURIComponent(a)}`),
          ]);
          const j = await r1.json();
          const c = await r2.json();
          if (!r1.ok) throw new Error(j.error || `HTTP ${r1.status}`);
          if (!r2.ok) throw new Error(c.error || `HTTP ${r2.status}`);

          window.__oddUltraUniqueTotals = j.oddUltraUniqueTotals || null;
          renderWallet(j.address, j.displayName, j.counts, j.oddPets, j.veryOddPets, j.ownedUniqueOdd, j.ownedUniqueVeryOdd);
          renderGallery(j.oddPets || [], j.veryOddPets || []);
          renderMissing(c.missingOdd || [], c.missingUltraOdd || []);
          renderCatalog(c.odd || [], c.ultraOdd || []);
          renderTypeWall(c.odd || [], c.ultraOdd || []);

          const u = new URL(location.href);
          u.searchParams.set('address', a);
          history.replaceState(null, '', u);
        } catch (e) {
          err.textContent = String(e && e.message ? e.message : e);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Check';
        }
      }

      let lbLoaded = false;
      async function loadLeaderboard(force) {
        const el = $('out-leaderboard');
        el.innerHTML = '<div class="k" style="padding:12px 0;">Loading leaderboard… (may take 10–30s first time)</div>';
        try {
          const url = force ? '/api/leaderboard?refresh=1' : '/api/leaderboard';
          const r = await fetch(url);
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
          lbLoaded = true;

          const age = j.ageSeconds != null
            ? `<span style="opacity:.5;font-size:12px;"> · updated ${j.ageSeconds < 3600 ? Math.floor(j.ageSeconds/60)+'m' : Math.floor(j.ageSeconds/3600)+'h'} ago</span>`
            : '';

          const rows = (j.entries || []).map((e, i) => {
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
            const name = e.profileName || (e.address.slice(0,6) + '…' + e.address.slice(-4));
            return `
              <div style="display:flex; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid #22304a;">
                <div style="min-width:32px; text-align:center; font-size:15px;">${medal}</div>
                <div style="flex:1; min-width:0;">
                  <div class="v" style="font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${name}</div>
                  <div class="k" style="font-size:11px;">${e.address.slice(0,10)}…</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-size:13px; font-weight:700; color:#c084fc;">⚡ ${e.ultraOdd}</div>
                  <div style="font-size:12px; opacity:.7;">🎯 ${e.odd}</div>
                </div>
              </div>`;
          }).join('');

          el.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <div class="k" style="font-size:12px;">${j.entries.length} collectors${age}</div>
              <button onclick="loadLeaderboard(true)" style="width:auto; padding:6px 12px; font-size:12px; margin:0;" title="Force rebuild (takes ~30s)">↻ Force rebuild</button>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:16px; margin-bottom:6px; font-size:12px; opacity:.6;">
              <span>⚡ Ultra Odd</span><span>🎯 Odd</span>
            </div>
            ${rows || '<div class="k">(ingen)</div>'}
          `;
        } catch(e) {
          el.innerHTML = `<div class="err">${e.message || e}</div>`;
        }
      }

      let statsLoaded = false;
      async function loadStats() {
        if (statsLoaded) return;
        const el = $('out-stats-top') || $('out-stats');
        if (el) el.innerHTML = '<div class="k" style="padding:12px 0;">Loading…</div>';
        try {
          const r = await fetch('/api/stats');
          const j = await r.json();
          if (!r.ok) throw new Error(j.error);
          statsLoaded = true;
          const topName = j.topCollector?.profileName || (j.topCollector?.address?.slice(0,10)+'…');
          if (!el) return;
          el.innerHTML = `
            <div class="row"><div class="k">Total collectors</div><div class="v">${j.totalCollectors}</div></div>
            <div class="row"><div class="k">Total Ultra Odd pets</div><div class="v">⚡ ${j.totalUltraOdd}</div></div>
            <div class="row"><div class="k">Total Odd pets (of collectors)</div><div class="v">🎯 ${j.totalOdd}</div></div>
            <div class="row"><div class="k">#1 collector</div><div class="v" style="max-width:60%;overflow:hidden;text-overflow:ellipsis;">${topName || '—'} (⚡${j.topCollector?.ultraOdd} / 🎯${j.topCollector?.odd})</div></div>
          `;
        } catch(e) {
          el.innerHTML = `<div class="err">${e.message || e}</div>`;
        }
      }

      function downloadText(filename, text, mime) {
        const blob = new Blob([text], { type: mime || 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function escapeXml(s) {
        return String(s)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&apos;');
      }

      function buildMosaicSvg({ address, oddPets, veryOddPets }) {
        // Settings
        const tile = 64;
        const gap = 8;
        const cols = 8;
        const pad = 24;
        const headerH = 76;

        const all = [...veryOddPets.map(p => ({...p, ultra:true})), ...oddPets.map(p => ({...p, ultra:false}))];
        const rows = Math.ceil(all.length / cols) || 1;
        const width = pad*2 + cols*tile + (cols-1)*gap;
        const height = headerH + pad + rows*tile + (rows-1)*gap + pad;

        const title = 'Odd Pet Hunter — Collection Wall';
        const subtitle = `${address} · ⚡${veryOddPets.length} ultra odd · 🎯${oddPets.length} odd`;

        const tiles = all.map((p, i) => {
          const r = Math.floor(i / cols);
          const c = i % cols;
          const x = pad + c*(tile+gap);
          const y = headerH + r*(tile+gap);
          const stroke = p.ultra ? '#c084fc' : '#22304a';
          const burned = (p.name||'').toLowerCase().startsWith('unrevealed');
          return `
            <g>
              <rect x="${x-2}" y="${y-2}" width="${tile+4}" height="${tile+4}" rx="14" fill="#0b1020" stroke="${stroke}" stroke-width="3" />
              <image href="${escapeXml(p.iconUrl)}" x="${x}" y="${y}" width="${tile}" height="${tile}" preserveAspectRatio="xMidYMid slice" />
              ${burned ? `<text x="${x+tile/2}" y="${y+tile/2+7}" text-anchor="middle" font-size="28">✖</text>` : ''}
              ${p.ultra ? `<text x="${x+tile-6}" y="${y+14}" text-anchor="end" font-size="14">⚡</text>` : ''}
            </g>`;
        }).join('');

        return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
  <rect width="100%" height="100%" fill="#0b0e14"/>
  <text x="${pad}" y="36" fill="#e8eefc" font-size="24" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800">${escapeXml(title)}</text>
  <text x="${pad}" y="60" fill="#9fb0d8" font-size="14" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">${escapeXml(subtitle)}</text>
  ${tiles}
</svg>`;
      }

      async function fetchOwnerData() {
        const a = addr.value.trim();
        if (!/^0x[0-9a-fA-F]{40}$/.test(a)) {
          throw new Error('Invalid address');
        }
        const r = await fetch(`/api/owner?address=${encodeURIComponent(a)}`);
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
        return j;
      }

      async function loadImage(url) {
        return new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => resolve(img);
          img.onerror = () => resolve(null);
          img.src = url;
        });
      }

      function roundRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w/2, h/2);
        ctx.beginPath();
        ctx.moveTo(x+rr, y);
        ctx.arcTo(x+w, y, x+w, y+h, rr);
        ctx.arcTo(x+w, y+h, x, y+h, rr);
        ctx.arcTo(x, y+h, x, y, rr);
        ctx.arcTo(x, y, x+w, y, rr);
        ctx.closePath();
      }

      async function downloadTypeCompletionWallPng() {
        btnShare.disabled = true;
        btnShare.textContent = 'Building PNG…';
        err.textContent = '';
        try {
          const a = addr.value.trim();
          if (!/^0x[0-9a-fA-F]{40}$/.test(a)) throw new Error('Invalid address');

          const r = await fetch(`/api/catalog?address=${encodeURIComponent(a)}`);
          const c = await r.json();
          if (!r.ok) throw new Error(c.error || `HTTP ${r.status}`);

          const ultra = sortTypes(c.ultraOdd || []);
          const odd = sortTypes(c.odd || []);

          // layout
          const W = 700;
          const pad = 24;
          const titleH = 64;
          const sectionGap = 18;
          const cols = 8;
          const tile = 64;
          const gap = 8;
          const frame = 4;

          const sectionHeight = (count) => {
            const rows = Math.ceil(count / cols) || 1;
            return 22 + rows * (tile + gap) - gap;
          };

          const H = pad + titleH + sectionHeight(ultra.length) + sectionGap + sectionHeight(odd.length) + 26 + pad;

          const canvas = document.createElement('canvas');
          canvas.width = W;
          canvas.height = H;
          const ctx = canvas.getContext('2d');

          // bg
          ctx.fillStyle = '#0b0e14';
          ctx.fillRect(0, 0, W, H);

          // title
          ctx.fillStyle = '#e8eefc';
          ctx.font = '900 34px system-ui, -apple-system, Segoe UI, Roboto, Arial';
          ctx.fillText('Pet Hunter', pad, pad + 36);
          ctx.fillStyle = '#9fb0d8';
          ctx.font = '700 16px system-ui, -apple-system, Segoe UI, Roboto, Arial';
          ctx.fillText('All Odd / Ultra Odd types', pad, pad + 60);

          let y = pad + titleH;

          async function drawSection(label, items, strokeOwned, strokeMissing) {
            const ownedCount = items.filter((i) => i.owned === true).length;

            ctx.fillStyle = '#e8eefc';
            ctx.font = '900 18px system-ui, -apple-system, Segoe UI, Roboto, Arial';
            ctx.fillText(label, pad, y + 16);

            ctx.fillStyle = '#9fb0d8';
            ctx.font = '700 13px system-ui, -apple-system, Segoe UI, Roboto, Arial';
            const rt = ownedCount + '/' + items.length;
            const m = ctx.measureText(rt);
            ctx.fillText(rt, W - pad - m.width, y + 16);

            y += 22;

            const imgs = await Promise.all(items.map((t) => {
            const src = (t.owned === true && t.ownedPetId)
              ? `https://pets.defikingdoms.com/image/${t.ownedPetId}`
              : t.iconUrl;
            return loadImage(src);
          }));

            for (let i = 0; i < items.length; i++) {
              const t = items[i];
              const img = imgs[i];
              const r = Math.floor(i / cols);
              const cc = i % cols;
              const x = pad + cc * (tile + gap);
              const yy = y + r * (tile + gap);

              // card frame
              ctx.fillStyle = '#000';
              roundRect(ctx, x - frame, yy - frame, tile + frame * 2, tile + frame * 2, 16);
              ctx.fill();
              ctx.lineWidth = 4;
              ctx.strokeStyle = t.owned === true ? strokeOwned : strokeMissing;
              ctx.stroke();

              if (img) {
                ctx.save();
                roundRect(ctx, x, yy, tile, tile, 14);
                ctx.clip();
                ctx.filter = t.owned === true
                  ? 'contrast(105%) brightness(95%)'
                  : 'grayscale(100%) contrast(105%) brightness(95%)';
                ctx.drawImage(img, x, yy, tile, tile);
                ctx.restore();
                ctx.filter = 'none';
              }

              // Debug label: ✅/⬜ + appearanceId (only when debug overlay is ON)
              if (__wallDebug) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                roundRect(ctx, x+4, yy+4, 48, 18, 6);
                ctx.fill();
                ctx.fillStyle = '#e8eefc';
                ctx.font = '700 11px system-ui, -apple-system, Segoe UI, Roboto, Arial';
                const mark = (t.owned === true) ? '✅' : '⬜';
                ctx.fillText(`${mark} ${t.appearanceId}`, x+8, yy+17);
              }
            }

            const rows = Math.ceil(items.length / cols) || 1;
            y += rows * (tile + gap) - gap;
          }

          await drawSection('Ultra Odd', ultra, '#c084fc', '#334155');
          y += sectionGap;
          await drawSection('Odd', odd, '#f59e0b', '#334155');

          // footer
          y += 18;
          ctx.fillStyle = '#9fb0d8';
          ctx.font = '700 14px system-ui, -apple-system, Segoe UI, Roboto, Arial';
          ctx.fillText('https://dfkpets.kvervandi.app', pad, y);

          canvas.toBlob((blob) => {
            if (!blob) throw new Error('PNG export failed');
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `type_completion_wall.png`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
          }, 'image/png');

        } catch (e) {
          err.textContent = String(e && e.message ? e.message : e);
        } finally {
          btnShare.disabled = false;
          btnShare.textContent = 'Download Type Completion Wall (PNG)';
        }
      }

      function wireDownloadButton() {
        btnShare = $("btn-share");
        if (btnShare) btnShare.addEventListener('click', downloadTypeCompletionWallPng);
      }

      // wiring
      btn.addEventListener('click', async () => {
        activateSub('user');
        await runWalletCheck();
      });
      addr.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });

      // Prefill from URL ?address= or default
      const urlAddr = new URLSearchParams(location.search).get('address');
      addr.value = (urlAddr && /^0x[0-9a-fA-F]{40}$/.test(urlAddr))
        ? urlAddr
        : '0x092A58AE214343282EA615b3ffDB61fB71bD5B6C';

      // Default: leaderboard tab
      activateTop('leaderboard');
      loadLeaderboard();

      // Auto-run wallet check if address in URL (and jump to wallet)
      if (urlAddr && /^0x[0-9a-fA-F]{40}$/.test(urlAddr)) {
        activateTop('wallet');
        btn.click();
      }
    </script>
  </body>
</html>
